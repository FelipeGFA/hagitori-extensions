name: "\U0001F310 Source Request"
description: Suggest a new manga source to be added
labels: ["source request"]
body:
  - type: input
    id: name
    attributes:
      label: Source name
      placeholder: 'Example: "Not Real Scans"'
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Source URL
      placeholder: 'Example: "https://notrealscans.org"'
    validations:
      required: true

  - type: input
    id: language
    attributes:
      label: Language(s)
      placeholder: 'Example: "English" or "Portuguese, Spanish"'
    validations:
      required: true

  - type: input
    id: manga-example
    attributes:
      label: Example manga page
      description: A URL to an example manga on the site.
      placeholder: "https://notrealscans.org/manga/example-title"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Additional details
      placeholder: |
        Any relevant information: NSFW content, Cloudflare protection,
        relationship with other sites, etc.

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Your issue will be closed if you haven't done these steps.
      options:
        - label: I have searched [existing issues](https://github.com/hagitori/hagitori-extensions/issues) and confirmed this source has not been requested.
          required: true
        - label: I have verified the source is not already available in the [extensions catalog](https://github.com/hagitori/hagitori-extensions).
          required: true
