name: Build & Catalog

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-catalog
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install --frozen-lockfile

      - run: node .github/scripts/build.mjs

      - run: node .github/scripts/build_catalog.mjs --repo "${{ github.repository }}" --branch "${{ github.ref_name }}"

      - name: Commit & push
        run: |
          git config user.name "hagitori-bot"
          git config user.email "hagitori-bot@users.noreply.github.com"
          git add builds/ catalog.json catalog.min.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: build extensions & rebuild catalog [skip ci]"
            git push
          fi
